name: Gate 7 Physics Rules

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  deterministic-rules:
    name: Physics rule protocol and OpenFOAM pack — Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install core and test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Compile rule package
        run: python -m compileall -q caereflex/rules caereflex/cli/rules.py

      - name: Run Gate 7 tests
        id: tests
        continue-on-error: true
        run: |
          set -o pipefail
          python -m pytest -q --tb=short \
            tests/test_gate7_rule_protocol.py \
            tests/test_gate7_openfoam_pack.py \
            tests/test_gate7_cli.py \
            2>&1 | tee gate7-rules-${{ matrix.python-version }}.log

      - name: Upload Gate 7 report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gate7-rules-${{ matrix.python-version }}
          path: gate7-rules-${{ matrix.python-version }}.log
          if-no-files-found: error

      - name: Fail when Gate 7 tests fail
        if: steps.tests.outcome == 'failure'
        run: exit 1
