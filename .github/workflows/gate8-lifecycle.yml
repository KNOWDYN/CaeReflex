name: Gate 8 Lifecycle Services

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  lifecycle:
    name: Lifecycle, reviews, jobs and REST — Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install server and test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[server,dev]"
      - name: Compile Gate 8 packages
        run: python -m compileall -q caereflex/lifecycle caereflex/cli/lifecycle.py caereflex/server/app.py
      - name: Generate bounded OpenAPI contract
        run: python -c "from caereflex.server.app import generate_openapi_files; generate_openapi_files('build/openapi')"
      - name: Smoke-test lifecycle CLI
        run: caereflex lifecycle version
      - name: Run Gate 8 acceptance tests
        run: python -m pytest -q --tb=short tests/test_gate8_lifecycle.py
