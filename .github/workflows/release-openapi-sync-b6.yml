name: One-time 2.0.0b6 OpenAPI sync

on:
  push:
    branches:
      - agent/release-2.0.0b6

permissions:
  contents: write

jobs:
  sync-openapi-version:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out release branch
        uses: actions/checkout@v4
        with:
          ref: agent/release-2.0.0b6
          fetch-depth: 0

      - name: Synchronize checked-in OpenAPI versions
        shell: python
        run: |
          from pathlib import Path

          targets = [Path("openapi/openapi.json"), Path("openapi/openapi.yaml")]
          for path in targets:
              text = path.read_text(encoding="utf-8")
              updated = text.replace("2.0.0b5", "2.0.0b6", 1)
              if updated == text:
                  raise SystemExit(f"Expected stale OpenAPI version not found in {path}")
              path.write_text(updated, encoding="utf-8")

      - name: Commit synchronized OpenAPI metadata
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add openapi/openapi.json openapi/openapi.yaml
          git commit -m "release: synchronize 2.0.0b6 OpenAPI metadata"
          git push origin HEAD:agent/release-2.0.0b6
