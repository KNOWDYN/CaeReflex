name: Gate 7 Physics Rules

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  rules:
    name: Physics protocol and OpenFOAM pack — Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install core and test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
      - name: Compile physics package
        run: python -m compileall -q caereflex/physics caereflex/cli/physics.py
      - name: Run Gate 7 tests
        run: python -m pytest -q --tb=short tests/test_gate7_physics_rules.py
