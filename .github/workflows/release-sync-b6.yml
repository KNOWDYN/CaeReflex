name: One-time 2.0.0b6 release label sync

on:
  push:
    branches:
      - agent/release-2.0.0b6

permissions:
  contents: write

jobs:
  sync-release-labels:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out release branch
        uses: actions/checkout@v4
        with:
          ref: agent/release-2.0.0b6
          fetch-depth: 0

      - name: Synchronize public version labels
        shell: python
        run: |
          from pathlib import Path

          targets = [Path("README.md"), Path("site/index.html")]
          for path in targets:
              text = path.read_text(encoding="utf-8")
              updated = text.replace("2.0.0b5", "2.0.0b6")
              if updated == text:
                  raise SystemExit(f"Expected stale release label not found in {path}")
              path.write_text(updated, encoding="utf-8")

      - name: Commit synchronized labels
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md site/index.html
          git commit -m "release: synchronize public 2.0.0b6 labels"
          git push origin HEAD:agent/release-2.0.0b6
