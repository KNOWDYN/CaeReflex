name: Gate 8 OpenAPI Sync

on:
  push:
    branches: [feature/gate-8-lifecycle-temporal-jobs]

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/gate-8-lifecycle-temporal-jobs
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install server dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[server]"
      - name: Regenerate tracked OpenAPI documents
        run: python -c "from caereflex.server.app import generate_openapi_files; generate_openapi_files('openapi')"
      - name: Commit generated documents when changed
        run: |
          if git diff --quiet -- openapi/openapi.json openapi/openapi.yaml; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add openapi/openapi.json openapi/openapi.yaml
          git commit -m "docs: regenerate Gate 8 OpenAPI contract"
          git push origin HEAD:feature/gate-8-lifecycle-temporal-jobs
