components:
  schemas:
    CrossRefRequest:
      properties:
        query:
          anyOf:
          - type: string
          - type: 'null'
          title: Query
        include_case_tags:
          type: boolean
          title: Include Case Tags
          default: true
        limit:
          type: integer
          title: Limit
          default: 10
        mailto:
          anyOf:
          - type: string
          - type: 'null'
          title: Mailto
        mock_response:
          anyOf:
          - type: string
          - type: 'null'
          title: Mock Response
      type: object
      title: CrossRefRequest
    ExportRequest:
      properties:
        out:
          anyOf:
          - type: string
          - type: 'null'
          title: Out
      type: object
      title: ExportRequest
    HTTPValidationError:
      properties:
        detail:
          items:
            $ref: '#/components/schemas/ValidationError'
          type: array
          title: Detail
      type: object
      title: HTTPValidationError
    ImportRequest:
      properties:
        path:
          type: string
          title: Path
        adapter:
          type: string
          title: Adapter
          default: auto
        attach_crossref:
          type: boolean
          title: Attach Crossref
          default: false
        return_agent_context:
          type: boolean
          title: Return Agent Context
          default: true
        options:
          additionalProperties: true
          type: object
          title: Options
          default: {}
      type: object
      required:
      - path
      title: ImportRequest
    ValidationError:
      properties:
        loc:
          items:
            anyOf:
            - type: string
            - type: integer
          type: array
          title: Location
        msg:
          type: string
          title: Message
        type:
          type: string
          title: Error Type
        input:
          title: Input
        ctx:
          type: object
          title: Context
      type: object
      required:
      - loc
      - msg
      - type
      title: ValidationError
