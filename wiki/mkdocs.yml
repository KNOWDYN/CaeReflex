site_name: CaeReflex Wiki
site_description: Agent-readable engineering evidence for simulation artefacts
repo_url: https://github.com/KNOWDYN/CaeReflex
docs_dir: docs
site_dir: site
strict: true
theme:
  name: material
  features:
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
markdown_extensions:
  - admonition
  - toc:
      permalink: true
  - tables
  - fenced_code
  - attr_list
nav:
  - Home: index.md
  - Getting Started:
      - Install: user-guide/install.md
      - Quickstart: user-guide/quickstart.md
      - Examples: user-guide/examples.md
      - Dimensions and Units: user-guide/dimensions-and-units.md
      - Safe Execution and Arrays: user-guide/safe-execution-and-arrays.md
      - Native OpenFOAM Inspection: user-guide/native-openfoam-inspection.md
      - Native Gmsh Inspection: user-guide/native-gmsh-inspection.md
      - Native VTK Inspection: user-guide/native-vtk-inspection.md
      - Safe Use Policy: user-guide/safe-use-policy.md
  - Learning Projects:
      - Overview: learning/index.md
      - Learning Paths: learning/learning-paths.md
      - Environment Setup: learning/environment-setup.md
      - Assessment Rubric: learning/assessment-rubric.md
      - Glossary: learning/glossary.md
      - CLI-first Inspection: learning/cli-first-inspection.md
      - Gmsh Geometry Inspection: learning/gmsh-geometry-inspection.md
      - OpenFOAM Case Review: learning/openfoam-case-review.md
      - VTK Result Context: learning/vtk-result-context.md
      - CrossRef Literature Context: learning/crossref-literature-context.md
      - REST/OpenAPI Agent Workflow: learning/rest-openapi-agent-workflow.md
      - Adapter Extension Design: learning/adapter-extension-design.md
      - Instructor Guide: learning/instructor-guide.md
  - Architecture:
      - Overview: architecture/index.md
      - ReflexCase Schema: architecture/reflexcase-schema.md
      - Spatial Evidence: architecture/spatial-evidence.md
      - Services Layer: architecture/services-layer.md
      - Adapters: architecture/adapters.md
      - Exporters: architecture/exporters.md
      - CrossRef: architecture/crossref.md
      - CLI: architecture/cli.md
      - REST API: architecture/rest-api.md
  - Developer Guide:
      - Contributing: developer-guide/contributing.md
      - Testing: developer-guide/testing.md
      - Adding Adapters: developer-guide/adding-adapters.md
      - Release Controls: developer-guide/release-controls.md
  - Reference:
      - CLI Reference: reference/cli.md
      - OpenAPI: reference/openapi.md
      - ReflexCase Fields: reference/reflexcase-fields.md
      - Licensing: reference/licensing.md
      - Security: reference/security.md
  - Releases:
      - Overview: releases/index.md
      - 2.0.0b2: releases/2.0.0b2.md
      - 2.0.0b1: releases/2.0.0b1.md
      - 2.0.0a5: releases/2.0.0a5.md
      - 2.0.0a4: releases/2.0.0a4.md
      - 2.0.0a3: releases/2.0.0a3.md
      - 2.0.0a2: releases/2.0.0a2.md
      - 2.0.0a1: releases/2.0.0a1.md
      - 1.0.0: releases/1.0.0.md
